<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel ="stylesheet" href="style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button class="new-game">New Game</button>
    </div>
    <main>
        <header class="header">
            <h1 class="title">
                <span class="title-x">X</span>
                <span class="title-sep">&</span>
                <span class="title-o">O</span>
            </h1>
            <h2 class="subtitle">Tic-Tac-Toe</h2>
        </header>

        <section class="scoreboard" id="scoreboard">
            <div class="score-card score-x">
                <span class="score-label">X Wins</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-card score-draw">
                <span class="score-label">Draws</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score-card score-o">
                <span class="score-label">O Wins</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </section>

        <section class="turn-indicator" id="turn-indicator">
            <span class="turn-symbol" id="turn-symbol">X</span>
            <span class="turn-text">'s turn</span>
        </section>

        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button class="reset">Reset Game</button>
    </main>
    <script src=" script.js"></script>
</body>
</html>
